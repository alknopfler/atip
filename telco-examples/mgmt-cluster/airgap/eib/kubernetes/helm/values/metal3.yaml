global:
  ironicIP: ${MGMT_CLUSTER_IP}
  enable_vmedia_tls: false
  # trustedCAs: tls-ca-bundle  # Optional: Uncomment and set to ConfigMap name containing full CA bundle
metal3-ironic:
  ipa:
    useHauler: true
  global:
    predictableNicNames: "true"
  persistence:
    ironic:
      size: "5Gi"
  service:
    type: NodePort

